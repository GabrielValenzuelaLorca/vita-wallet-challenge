# Frontend nginx server.
# Serves the Vite production bundle and reverse-proxies /api/* to the
# backend service inside the docker-compose network. This mirrors the
# /api proxy that vite.config.ts sets up in dev, so the frontend code
# can keep calling fetch("/api/...") in any environment.
server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Gzip text assets — mostly cosmetic for a small SPA but cheap to enable.
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;

    # Reverse-proxy backend API. Strips the /api prefix so the request
    # arrives at the Rails routes as /auth/login, /balances, etc.
    location /api/ {
        rewrite ^/api/(.*)$ /$1 break;
        proxy_pass http://backend:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # SPA routing: any unknown path falls back to index.html so React Router
    # can take over.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
